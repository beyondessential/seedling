[workspace]
pr_name = "repo: release"
pr_branch_prefix = "release-plz/"
pr_labels = ["autorelease"]
# Generate changelogs so the release PR body lists the changes, but keep them
# out of the repo: CHANGELOG.md is gitignored, so release-plz writes it to
# populate the PR body without committing it.
changelog_update = true
# No crate is published to a registry (all are publish = false in Cargo.toml);
# tell release-plz the same so it does not attempt a cargo publish.
publish = false
# Every crate still gets a git tag, so a change to ANY of them opens a release
# PR and bumps the shared workspace version. Only the `seedling` package cuts a
# GitHub release (below); the other crates get plain tags (seedling-core-v*,
# etc.) which are harmless — only `v<version>` triggers the release build.
git_release_enable = false

[[package]]
name = "seedling"
publish = false
git_release_enable = true
git_tag_name = "v{{ version }}"
git_release_name = "v{{ version }}"
semver_check = false
