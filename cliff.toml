# git-cliff configuration.
#
# Used by the release automation (.github/workflows/release-pr.yml) to compute
# the next semantic version from Conventional Commits and to render release
# notes. The changelog is not committed to the repo (CHANGELOG.md is
# gitignored); it is only rendered to populate the release PR body and the
# GitHub release notes.

[changelog]
header = ""
# Body rendered per release. Groups commits by type; omits the author trailer.
body = """
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {{ commit.message | upper_first }}\
{% endfor %}
{% endfor %}
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
# Only consider `v<semver>` tags (the release tags). Ignores any other tags.
tag_pattern = "v[0-9]*"
# main is merge-queue-only (the branch ruleset requires PR merges, method=MERGE),
# so every change lands as one merge commit whose message is the curated
# Conventional-Commit PR title ending in "(#N)". Keep exactly those — one clean
# line per PR — and drop the PRs' individual branch commits, which would
# otherwise duplicate each entry. The release-bump commit is skipped explicitly.
commit_parsers = [
  { message = "^chore\\(release\\)", skip = true },
  { message = "^feat.*\\(#[0-9]+\\)", group = "Features" },
  { message = "^fix.*\\(#[0-9]+\\)", group = "Bug fixes" },
  { message = "^perf.*\\(#[0-9]+\\)", group = "Performance" },
  { message = "^refactor.*\\(#[0-9]+\\)", group = "Refactor" },
  { message = "^docs?.*\\(#[0-9]+\\)", group = "Documentation" },
  { message = "^deps.*\\(#[0-9]+\\)", group = "Dependencies" },
  { message = "^ci.*\\(#[0-9]+\\)", group = "CI" },
  { message = ".*\\(#[0-9]+\\)", group = "Other" },
  # Anything without a PR reference is a branch/duplicate commit; drop it.
  { message = ".*", skip = true },
]
protect_breaking_commits = true
filter_commits = false
topo_order = false
sort_commits = "oldest"
