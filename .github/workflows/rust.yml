name: Rust

on:
  pull_request:
  merge_group:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  SKIP_FRONTEND_BUILD: "1"

concurrency:
  group: rust-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Configure toolchain
        run: |
          rustup toolchain install --profile minimal --no-self-update stable
          rustup default stable
          rustup component add rustfmt clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libsystemd-dev
      - name: Create frontend/dist placeholder
        run: mkdir -p crates/web/frontend/dist
      - name: cargo fmt
        run: cargo fmt --all --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Configure toolchain
        run: |
          rustup toolchain install --profile minimal --no-self-update stable
          rustup default stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libsystemd-dev
      - name: Create frontend/dist placeholder
        run: mkdir -p crates/web/frontend/dist
      # --all-targets --locked compiles every target (so it also covers a plain
      # build) and asserts Cargo.lock is in sync.
      - name: cargo test
        run: cargo test --workspace --all-targets --locked

  spikes-windows:
    name: Spikes (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Configure toolchain
        run: |
          rustup toolchain install --profile minimal --no-self-update stable
          rustup default stable
          rustup component add rustfmt clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: spikes-windows
          save-if: ${{ github.ref == 'refs/heads/main' }}
      # Scoped to the spikes crate: the daemon/core crates are Linux-only
      # (systemd), so a full workspace build is not attempted on Windows.
      - name: cargo fmt
        run: cargo fmt -p seedling-spikes --check
      - name: cargo clippy
        run: cargo clippy -p seedling-spikes --all-targets --locked -- -D warnings
      - name: cargo test
        run: cargo test -p seedling-spikes --all-targets --locked

  rust-pass:
    name: Rust pass
    if: always()
    needs: [lint, test, spikes-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
