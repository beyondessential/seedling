name: Caddy image

on:
  push:
    branches:
      - main
    paths:
      - docker/caddy/**
      - .github/workflows/caddy-image.yml
  workflow_dispatch:

concurrency:
  group: caddy-image
  cancel-in-progress: false

env:
  # Keep in sync with the Caddy base + caddy-l4 versions in
  # docker/caddy/Containerfile and with CADDY_IMAGE in startup.rs.
  TAG: "2.11.3-l4.0.1.1"

jobs:
  build:
    name: Build and publish
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v4.1.0
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: docker/caddy
          file: docker/caddy/Containerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/beyondessential/seedling-caddy:${{ env.TAG }}
            ghcr.io/beyondessential/seedling-caddy:latest
