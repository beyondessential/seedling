name: CodeQL

# Static analysis of the Rust workspace with GitHub CodeQL. Rust uses the
# build-less analysis mode (build-mode: none), so no toolchain or system
# dependencies are needed here.

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 3 * * 1" # weekly, Monday 03:00 UTC

jobs:
  analyze:
    name: Analyze (rust)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4.36.1
        with:
          languages: rust
          build-mode: none
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4.36.1
        with:
          category: "/language:rust"
